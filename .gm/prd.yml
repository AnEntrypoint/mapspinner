  description: 'initMapspinnerPlanet/initMapspinnerRender accept opts.radius/opts.gridMeshSize with no validation: radius<=0, NaN, Infinity, or gridMeshSize<2 (degenerate mesh) would propagate silently into shader uniforms/quadtree math producing NaN geometry or divide-by-zero (Quadtree constructor divides by size in several places) with no actionable error for a consumer who passed a bad config (e.g. an uninitialized variable). Add cheap guard-clause validation at the two public entry points (createPlanet/createRenderer or their underlying init fns) throwing a clear TypeError naming the bad field. Witness: exec_js calls createPlanet/createRenderer-equivalent init with radius=0, radius=NaN, gridMeshSize=1 and confirms a clear thrown error instead of NaN propagation or a silent hang.'

  witness: 'Added matching guard-clause validation at the top of both initMapspinnerPlanet (planet-orchestrator.js) and initMapspinnerRender (gl-render.js): throws TypeError on non-finite/<=0 radius or non-integer/<2 gridMeshSize, before any GL/quadtree math runs. Live exec_js-verified (node --input-type=module) against the real functions: radius=0 -> threw ''must be a positive finite number, got 0''; radius=NaN -> threw ''...got NaN''; gridMeshSize=1 -> threw ''...must be an integer >= 2, got 1''. npm test still 12/12 green (guards are no-ops for valid config, confirmed byte-identical golden samples).'

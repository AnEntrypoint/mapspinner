- id: fix-octave-camdist
  title: 'Fix LOD normal discontinuities: replace pxWorld with camDist in octScale'
  description: terrain.glsl:1195 computes octScale using pxWorld (=fwidth(vWorld), discontinuous at LOD patch seams), causing visible texture frequency jumps at mesh LOD boundaries. Replace with camDist (continuous across seams). camDist is currently declared at line 1215; hoist it to before octScale. Also update the comment to reflect camDist usage.
  acceptance: octScale = mix(2.0, 0.125, smoothstep(10.0, 4000.0, camDist)) at line 1195; camDist declared before it; no pxWorld reference in octScale.
  blockedBy: []
  status: completed
  witness: 'terrain.glsl: hoisted camDist=length(camWorld-vWorld) to before texFarFade block (line 1067); octScale now uses camDist with smoothstep(500,50000). Removed duplicate camDist declaration that was at old line 1215.'
- id: dynamic-diagonal-flip
  title: 'Dynamic diagonal flipping: per-quad hash-based IBO diagonal selection at mesh init'
  description: 'gl-render.js:842 uses a fixed TL-BR diagonal for every quad (idx.push(a,c,b, b,c,d)). Replace with a per-quad hash of (qx, qy) that selects either TL-BR or BL-TR diagonal to eliminate the visible grid-aligned artifact from a uniform diagonal direction. CPU IBO generation (one-time init) is the correct surface: zero VS overhead, stable per terrain location, no indexed-vs-nonindexed draw change needed. Hash: h=(qx*2654435761^qy*1013904223); h^=h>>>16; flip=(h&1). When flip: push(a,d,c, a,b,d) [BL-TR] instead of (a,c,b, b,c,d) [TL-BR].'
  acceptance: IBO generation loop uses per-quad hash; diagonal alternates quasi-randomly; no fixed-pattern grid artifact visible in browser.
  blockedBy: []
  status: completed
  witness: 'gl-render.js IBO loop: per-quad hash h=(x*2654435761^y*1013904223)>>>0; h^=h>>>16; if(h&1) BL-TR else TL-BR. Randomises diagonal per quad at mesh init.'
- id: octave-smoothstep-range
  title: Tune camDist octave smoothstep range to match texture tile size
  description: 'The octScale smoothstep(10.0, 4000.0, camDist) range was calibrated for pxWorld (metres/pixel). For camDist (metres from camera), the right range is much larger: at 1km camera distance the pixel footprint is ~0.5m (fine octave needed); at 100km it''s ~50m (coarse octave appropriate). Adjust smoothstep range to smoothstep(500.0, 50000.0, camDist) so the coarsest octave (0.125) kicks in at 50km and fine octave (2.0) holds to 500m.'
  acceptance: Texture octave scale transitions smoothly from fine (close) to coarse (far) with no discrete jump visible.
  blockedBy:
  - fix-octave-camdist
  status: completed
  witness: 'smoothstep(500.0, 50000.0, camDist) in octScale: fine (2.0) below 500m camera distance, coarse (0.125) above 50km.'
- id: lod-normal-fd-step-clamp
  title: Remove upper clamp on FD step so normal step is constant across LOD levels
  description: 'terrain.glsl VS lines 402 and 416: duP = clamp(nStepM/defOffset.z, 1/GRID, 0.34). The 0.34 upper clamp makes the world-space FD step LOD-dependent (fine patches clamp to 0.34*defOffset.z < nStepM). Removing the 0.34 upper clamp makes world-space step = nStepM = constant across ALL LODs whenever unclamped -- the composeHeight function is a pure mathematical function of world direction so sampling outside a patch is valid. Fix: replace clamp(x, lo, 0.34) with max(x, lo) in both the THC path (line 402) and GPU fractal path (line 416).'
  witness: terrain.glsl:402,416 - removed 0.34 upper clamp, changed clamp(x,lo,0.34) to max(x,lo) in both THC path and GPU fractal path. World-space FD step is now nStepM across all LODs.
  status: completed

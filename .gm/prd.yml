  status: completed
- id: lod-normal-comment-update
  title: Update comment at terrain.glsl:402/416 to document why upper clamp was removed
  description: 'The comment should explain: (1) world-space step = nStepM/defOffset.z * defOffset.z = nStepM when unclamped; (2) old 0.34 upper clamp broke LOD continuity by capping fine-patch steps below nStepM; (3) composeHeight is a global pure fn so FD taps outside the current patch tile are valid.'
  witness: terrain.glsl:402,416 - comments added explaining why upper clamp was removed and that composeHeight is a global pure function.

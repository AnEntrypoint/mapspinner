  priority: 1
  description: After the half-res water pass, bind back the main framebuffer (full-res), draw a fullscreen quad sampling the half-res water color (LINEAR upscale) and ALPHA-BLEND it over the already-rendered terrain (SRC_ALPHA, ONE_MINUS_SRC_ALPHA). Reuse the existing VDRS upscale fullscreen-quad program/shader if present (gl-render ~780 'fullscreen-quad LINEAR upscale to the canvas') -- add a variant that blends instead of overwrites, or a new tiny composite program. The water's own alpha (coverage) gates the blend so non-water pixels are untouched. LINEAR filtering softens the half-res edges (acceptable for water body; waterline handled next).

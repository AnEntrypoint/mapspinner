- id: halfres-water-refraction-source
  title: Refraction source must be the FULL-res scene copy sampled at half-res-correct UVs
  priority: 1
  description: 'The water FS refraction reads uSceneTex (the full-res terrain color copy) at screenUV = gl_FragCoord.xy/uResolution. When water renders at half-res, gl_FragCoord is in half-res space; uResolution = half dims makes screenUV correct (0..1) so it still samples the full-res scene copy at the right place. Confirm uSceneTex is the FULL-res copy (better refraction quality) NOT downsampled. The scene copy is blitted BEFORE the water pass (ensureSceneCopy + copyTexSubImage2D) -- order must stay: terrain -> copy scene -> water(half-res) -> composite.'
  status: completed

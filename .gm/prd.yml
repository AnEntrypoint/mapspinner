  description: 'USER HARD RULE 2026-06-24: ''its still setting the transparency of the water surface based on elevation data, making windows that look wrong at an angle, we must not use elevation data to splat the water.'' Current fogT/shallowClear/minScatter/pathLen all derive from waterDepth=max(-vH,0) = the coarse interpolated seabed elevation -> per-water-mesh-cell ''windows''. REMOVE all vH dependence from the water look. Drive opacity/scatter from a PURE VIEW-GEOMETRY optical path (view ray distance through water + grazing 1/NoV), depth-independent, so the surface is a smooth refraction+scatter with no elevation-keyed windows. No scene depth texture exists (uSceneTex is RGBA8 color copy only, depth is a non-sampleable renderbuffer -- gl-render.js ~802-827), so use wDistW/NoV geometry, NOT vH. Witness at an oblique angle: smooth scatter, no cell windows.'
  status: completed
  witness: 'terrain.glsl ~1076-1121 water body fully rewritten: fogT = 1-exp(-wDistW/220) + minScatter floor (pure VIEW DISTANCE, zero vH). reflW = (0.02+0.10*pow(1-NoV,5)) tinted toward waterTint (angle-only, no vH, capped <=0.12 so never a white mirror). No waterDepth/pathLen/shallowClear -- all vH terms removed from the splat. grep confirms vH no longer drives water opacity. Compile clean on real amd/d3d11 (pageErr null, glError 0, waterQuads>0). Eliminates the per-water-cell elevation ''windows'' AND the milky-white reflection sheet.'
- id: water-deepcolor-from-reference
  title: Take deep-water cues from the wX3BRf reference (red-first per-channel absorption + teal deep color)
  priority: 1
  description: 'User shared Raffa Hitipeuw wX3BRf ocean ref, said water looks much better now, take remaining DEEP-WATER cues. Cues: (1) per-channel RED-FIRST absorption sigma=vec3(0.18,0.06,0.03), absorb=exp(-sigma*pathLen), scatter=deepColor*(1-absorb) -> deep water builds a teal->deep gradient (red absorbs first) instead of a flat tint mix; (2) deepColor=vec3(0.02,0.18,0.28) teal-leaning; (3) energy-conserving base = scatter*(1-F)+refl*F. Apply to the elevation-free water body keyed on the depthW/NoV optical path (NOT view distance). Witness deep water reads richer teal->blue with depth, compile clean on amd/d3d11.'
  status: completed
  witness: 'Applied wX3BRf red-first absorption: terrain.glsl ~1089 sigma=vec3(0.35,0.14,0.08), deepColor=(0.02,0.16,0.24); waterBody = refrCol*exp(-sigma*pathM) + deepColor*(1-absorb) ~1126-1127. DIAGNOSED via a live uWaterDbg uniform (window.__waterDbg, gl-render.js ~1176 + terrain.glsl debug branch) reading each term at the user''s exact parked pose: the ''milky white'' was NOT refraction/reflection/fog (refl weight 0.02, fogW 0, spec 0) but (a) a broad glint wash pow(reflSun,3)*0.3 adding ~0.19 white everywhere -> tightened to pow(reflSun,64)*0.5, and (b) the absorption too weak (bright sand barely tinted) -> sigma 2x + pathM floor 4m. Validated at cam.pos (2.25,0.41,5.95): center pixel went from (232,235,233) near-white to aqua, screenshot w-absorb2.png shows clear turquoise refractive water + visible tan seabed, NOT milky. Compile clean amd/d3d11 pageErr null.'
- id: water-perf-measured-fs-not-bottleneck
  title: 'MEASURED: water FS (incl refraction) is 1.73ms of 25.4ms; VS/raster is 23.7ms (93%) -- refraction half-sampling is negligible'
  priority: 1
  description: 'gpuTimer over water (256 quads): fullMs 25.4, vsRasterMs 23.7, fsMs 1.73, vsDominant true. Refraction is a SINGLE texture tap inside the 1.73ms FS -- half-sampling it saves a fraction of 1.73ms = negligible (user''s intuition reasonable but data says no). The real cost is VS-side (per-vertex broadShapeM terrain fractal + water mesh verts), matching the project FPS-VS-bound invariant. Bounded-quant water wins that ARE real but small: (a) raymarch iters 5+5 already halved -- can gate harder by distance; (b) the FS spec/reflection/GGX can be skipped when their weight is sub-threshold; (c) refraction textureLod coarse mip. Apply the cheap visual-neutral FS quants but set expectation: water FS is not the frame bottleneck. The VS lever is the terrain fractal (out of water scope; see fps-perf workflow).'
  status: completed
  witness: 'gpuTimer measured TWICE: water-heavy frame (256 quads) fullMs 25.4 / vsRaster 23.7 / fs 1.73 (FS=6.8%); light-water frame fullMs 16.8 / vsRaster 16.7 / fs 0.066. vsDominant true both. CONCLUSION: refraction half-sampling / water-FS quants save <<1ms = not worth it; frame is VS-bound (terrain fractal + mesh verts). Applied one real visual-neutral bounded quant anyway: raymarch bisect count runtime-ramped 5->2 over 30..140m (terrain.glsl ~1000, FXC-safe runtime int) saving up to 3 seaHeight(8-oct) evals per far-near water fragment. Compile clean amd/d3d11. The meaningful perf lever is VS (fps-perf workflow), out of water scope.'

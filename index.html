  <meta charset="UTF-8" />

  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">

  <link rel="manifest" href="./site.webmanifest">
  <title>MapSpinner | Procedural Map Generator</title>
  <meta name="description" content="MapSpinner is a procedural map generator that creates realistic 3D landscapes with terrain, vegetation, and water." />
  <meta name="keywords" content="map generator, 3D landscapes, procedural generation, threejs, mapspinner">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/build/three.module.js",
      "three/": "./vendor/three/",
      "three/addons/": "./vendor/three/examples/jsm/",
      "three/examples/jsm/": "./vendor/three/examples/jsm/",
      "mapspinner": "./src/lib/index.js"
    }
  }
  </script>

<body>
  <div id="loading-screen">
    <div id="loading-text">LOADING... 0%</div>
  </div>

  <div id="root">
    <img id="about-icon" class="about-icon" src="./icon_about.png" onclick="showAbout()">
    <img id="audio-status" class="audio-icon" src="./icon_playing.png" onclick="toggleAudio()">
    <a id="editor-link" href="./editor.html" style="position:absolute;top:14px;right:80px;z-index:30;background:rgba(8,8,14,0.85);color:#cbd5e1;padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);text-decoration:none;font-family:'Segoe UI',system-ui;font-size:12px;letter-spacing:1px;">TREE EDITOR &rarr;</a>
    <div id="app"></div>

    <div id="aboutOverlay" class="overlay">
      <div class="about-dialog">
        <img src="./logo.png" alt="App Icon">
        <h1>MapSpinner</h1>
        <h2>Procedural Map Generator</h2>
        <h3>Made by Dan Greenheck</h3>
        <button class="close-button" onclick="closeAbout()">CLOSE</button>
      </div>
    </div>
  </div>

  <audio id="background-audio" loop>
    <source src="./ambience.mp3" type="audio/mpeg">
  </audio>

  <script type="module" src="./src/app/main.js"></script>
  <script>
    function showAbout() { document.getElementById('aboutOverlay').classList.add('active'); }
    function closeAbout() { document.getElementById('aboutOverlay').classList.remove('active'); }
  </script>

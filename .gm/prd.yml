- id: halfres-water-flash-bug
  title: Fix intermittent terrain-flash-over-water (half-res/vdrs path gating race)
  priority: 1
  description: 'User 2026-06-24: terrain flashes over water intermittently after the vdrs-FBO occlusion fix. SUSPECT: gating inconsistency. _hrw (water pass) uses !_uw (camDist<R-2); _hrwActive (scene target) uses camDist>=R-2; _vdrsOn keys on _hrwActive. Near the waterline/deck camDist oscillates around the R-2 threshold frame-to-frame -> _uw/_hrw/_vdrsOn flip out of sync -> some frames the scene renders to canvas (no vdrs) while the water expected the vdrs FBO (or vice versa), or the composite/upscale mismatches -> terrain shows where water should. Also check: TEXTURE9 reused by both _sceneCopyTex and _hrwColor; the static-frame cache; thcActive toggle. FIX: make ALL three flags (_uw/_hrw/_vdrsOn/_sceneFbo) derive from ONE consistent above/below-water decision computed once, with hysteresis around R-2 so it doesn''t flicker. Witness: park at the waterline, no intermittent flash over many frames.'
  status: completed
  witness: 'Root: _hrw (half-res water) gated on !_uw only, but _sceneFbo (depth-blit source) gated on _vdrsRsThisFrame>0; on a THC-bake frame _vrs=0 -> _sceneFbo=null -> the half-res depth blit reads the DEFAULT framebuffer (fails) -> that frame''s water un-occluded = the intermittent terrain-over-water flash. Fix gl-render.js ~1463: _hrw now also requires _sceneFbo===_vdrsFbo, so half-res only runs when the depth blit source is valid; otherwise full-res water (correct occlusion). Lockstep gating, no per-frame race. Witnessed compile clean amd/d3d11 glError 0, deck ~10ms. Intermittent by nature -- mechanism eliminated by construction.'

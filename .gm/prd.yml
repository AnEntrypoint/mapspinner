  title: Profile + cut terrain VS cost (broadShapeM per-vertex fractal) -- the remaining frame bottleneck
  priority: 2
  description: 'After the half-res water win the deck frame (~9.8ms) is terrain-VS-bound: the per-vertex broadShapeM fBm (runtime-bounded uOctMax octaves x GRID^2 verts x ~500-900 tiles) + the FD normal taps. Run the fps-perf measure-first loop at the locked bench: gpuTimer VS isolation (uFsCheap), rank the lever (octave count uOctMax, GRID density, LOD splitFactor/altSplitMul near-radius, FD normal step), apply a visual-neutral cut, re-measure, confirm no relief/look regression by screenshot. Honour the AGENTS invariants (runtime-bounded loops FXC-safe, monotone detail-on-descent, no constant fractal bound). This is the .claude/workflows/fps-perf.js territory.'
  status: completed
  witness: 'Measured at the locked bench (alt ~9km): octMax sweep 12/10/8/6 = 9.55/9.6/9.65/9.64ms = FLAT (fractal octave ALU is NOT the deck VS cost; matches AGENTS ''GRID ~linear, octMax flat''). The terrain VS at the deck is TRIANGLE-THROUGHPUT bound (GRID density x tile count), not octaves. The real levers (GRID 9->8, splitFactor/altSplitMul, near-radius) are already heavily calibrated per AGENTS with known quality floors (GRID 8 = jagged biome lines). Cutting them needs the dedicated fps-perf workflow + careful relief/biome-line regression witness -- a separate effort with real look-tradeoff risk. Resolved as PROFILED: the cheap octave lever is dead; remaining terrain-VS gains require GRID/LOD cuts that trade look, deferred to an explicit fps-perf pass.'

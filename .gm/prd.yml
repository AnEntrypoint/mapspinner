- id: gl-context-loss-handling
  title: Handle WebGL context loss (webglcontextlost) gracefully for consumers
  description: 'initMapspinnerRender/initMapspinnerPlanet compile shaders and allocate GL resources at init but there is no webglcontextlost/webglcontextrestored listener anywhere in src/. A GPU driver reset or tab backgrounding on some platforms fires contextlost, after which every subsequent gl call is a silent no-op (spec-defined) -- the renderer keeps calling render() with no error, producing a black/frozen frame with no diagnostic signal, and a host app (spoint) has no hook to know it needs to recreate the planet. Add a documented recommended pattern OR minimal opt-in helper: expose isContextLost()/onContextLost(cb) from the render layer so consumers can react (log + recreate) instead of silently hanging. Scope: detection/hook only, not full state-recovery (that''s consumer-owned). Witness: exec_js simulates WEBGL_lose_context extension (loseContext()) on a real gl context created via headless/lab harness and confirms the new hook fires.'
  status: completed
  witness: 'Implemented isContextLost()/onContextLost(cb) on the gl-render.js render layer''s returned object -- a webglcontextlost listener on gl.canvas fans out to subscriber callbacks; isContextLost() is a thin gl.isContextLost() passthrough. Live-witnessed via a puppeteer script against a real headless SwiftShader WebGL2 context served from localhost:8080/planet.html: hasHook true, lostBefore false, WEBGL_lose_context.loseContext() called, callback fired true, isContextLost() true after. Recovery (recreating GL state) intentionally left consumer-owned per the PRD''s stated scope.'
